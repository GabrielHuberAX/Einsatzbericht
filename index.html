<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service-Einsatzbericht | Automation</title>
    <!-- Tailwind CSS (Optimierte CDN-Einbindung) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Optimierung für den Druck (Print-Layout) */
        @media print {
            .no-print { display: none !important; }
            
            body { 
                background: white !important; 
                color: black !important; 
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            
            .container { 
                max-width: 100% !important; 
                width: 100% !important; 
                border: none !important; 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 0 !important; 
            }
            
            section, .dark-card { 
                background: white !important; 
                border: 1px solid #cbd5e1 !important; 
                color: black !important; 
                box-shadow: none !important;
                page-break-inside: avoid;
                break-inside: avoid;
                border-radius: 8px !important;
                margin-bottom: 1.5rem !important;
                display: block !important;
            }

            h1, h2, h3, p, label, input, td, th {
                color: black !important;
            }

            header {
                border-bottom: 3px solid #f59e0b !important;
                margin-bottom: 2rem !important;
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-between !important;
            }

            input {
                border-bottom: 1px solid #e2e8f0 !important;
                background: transparent !important;
                color: black !important;
            }

            .brand-gradient {
                background: #f59e0b !important;
                color: white !important;
            }

            svg {
                color: #f59e0b !important;
            }

            tr {
                background: transparent !important;
                border-bottom: 1px solid #e2e8f0 !important;
            }
            
            th {
                background-color: #f8fafc !important;
                border-bottom: 2px solid #cbd5e1 !important;
            }

            canvas {
                border: 1px solid #94a3b8 !important;
                background: white !important;
                max-width: 100%;
            }

            input::placeholder {
                color: transparent !important;
            }
        }

        /* Bildschirm-Design (Industrial Dark) */
        canvas {
            touch-action: none; /* Verhindert Scrollen beim Zeichnen */
            cursor: crosshair;
            border: 1px dashed #f59e0b;
            background-color: #fefce8;
        }

        .image-preview img {
            max-height: 150px;
            object-fit: cover;
            border-radius: 0.5rem;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .dark-card {
            background-color: #1e293b;
            border: 1px solid #334155;
        }

        input:focus {
            border-bottom-color: #f59e0b !important;
        }

        /* Standard-Pfeile bei Zahlenfeldern ausblenden */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Datepicker-Icon Invertierung für Dark Mode */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans p-4 md:p-8">

    <div id="capture-area" class="max-w-4xl mx-auto container">
        <!-- Header mit Logo und CI -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b-2 border-orange-500 pb-6 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-24 h-24 bg-white p-2 rounded-lg shadow-xl flex items-center justify-center">
                    <!-- Firmenlogo (Ladeschleife durch this.onerror=null gefixt) -->
                    <img src="AX_Logo_RGB_gold_black.png" alt="Automation Logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/150/ffffff/f59e0b?text=AX+LOGO'; this.className='opacity-40';" class="max-w-full max-h-full object-contain">
                </div>
                <div>
                    <h1 class="text-3xl font-black text-white tracking-tight uppercase">Einsatzbericht</h1>
                    <p class="text-orange-500 uppercase tracking-widest text-xs font-bold">Automation & Sondermaschinenbau</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="brand-gradient text-white px-4 py-1 rounded-full text-xs font-bold mb-3 no-print shadow-lg uppercase tracking-wider">Service Dokumentation</div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 uppercase text-right tracking-widest" for="reportNo">Berichts-Nummer</label>
                    <input type="text" id="reportNo" placeholder="EB-202X-001" class="text-right border-none bg-transparent font-mono font-bold text-orange-400 focus:ring-0 text-xl placeholder-slate-700">
                </div>
            </div>
        </header>

        <!-- Stammdaten & Anlagendaten -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <section class="dark-card p-6 rounded-2xl shadow-lg border-l-4 border-orange-500">
                <h2 class="text-sm font-black mb-6 flex items-center gap-2 text-white uppercase tracking-wider">
                    <svg class="text-orange-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Stammdaten
                </h2>
                <div class="space-y-5">
                    <div class="relative">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter" for="technicianName">Service-Techniker</label>
                        <input type="text" id="technicianName" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium">
                    </div>
                    <div class="relative">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter" for="customerName">Kunde / Einsatzort</label>
                        <input type="text" id="customerName" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium">
                    </div>
                    <div class="relative">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter" for="currentDate">Einsatzdatum</label>
                        <input type="date" id="currentDate" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium" style="color-scheme: dark;">
                    </div>
                </div>
            </section>

            <section class="dark-card p-6 rounded-2xl shadow-lg border-l-4 border-slate-400">
                <h2 class="text-sm font-black mb-6 flex items-center gap-2 text-white uppercase tracking-wider">
                    <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    Anlagendaten
                </h2>
                <div class="space-y-5">
                    <div class="relative">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Maschinentyp / Bezeichnung</label>
                        <input type="text" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium">
                    </div>
                    <div class="relative">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Seriennummer (SN)</label>
                        <input type="text" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Projekt-Nr.</label>
                            <input type="text" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium">
                        </div>
                        <div class="relative">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Stunden (h)</label>
                            <input type="number" class="w-full border-b border-slate-700 bg-transparent text-white focus:border-orange-500 outline-none py-1 transition-all font-medium">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Arbeitspakete -->
        <section class="dark-card p-6 rounded-2xl shadow-lg mb-8 overflow-hidden">
            <h2 class="text-sm font-black mb-6 flex items-center justify-between text-white uppercase tracking-wider">
                <div class="flex items-center gap-2">
                    <svg class="text-orange-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Tätigkeitsnachweise
                </div>
                <button type="button" onclick="addRow()" class="no-print brand-gradient hover:scale-105 active:scale-95 text-white text-[10px] font-black px-4 py-2 rounded-lg transition-all flex items-center gap-2 shadow-lg uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Paket hinzufügen
                </button>
            </h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase text-slate-500 border-b border-slate-700">
                            <th class="pb-3 px-2 w-1/4">Modul</th>
                            <th class="pb-3 px-2 w-1/2">Beschreibung der Tätigkeit</th>
                            <th class="pb-3 px-2 w-20 text-right">Dauer (h)</th>
                            <th class="pb-3 px-2 w-16 text-center">Status</th>
                            <th class="pb-3 px-2 w-10 no-print"></th>
                        </tr>
                    </thead>
                    <tbody id="workTableBody">
                        <tr class="border-b border-slate-700 last:border-0 group hover:bg-slate-700/30 transition-colors">
                            <td class="py-4 px-2">
                                <input type="text" class="w-full border-none focus:ring-1 focus:ring-orange-500/50 rounded px-2 py-1 text-sm bg-slate-900/50 font-bold text-orange-400 placeholder-slate-600" placeholder="z.B. Software">
                            </td>
                            <td class="py-4 px-2">
                                <input type="text" class="w-full border-none focus:ring-1 focus:ring-orange-500/50 rounded px-2 py-1 text-sm bg-slate-900/50 text-slate-200 placeholder-slate-600" placeholder="Beschreibung...">
                            </td>
                            <td class="py-4 px-2 text-right">
                                <input type="number" step="0.25" class="w-full border-none focus:ring-1 focus:ring-orange-500/50 rounded px-2 py-1 text-sm text-right font-mono bg-slate-900/50 text-orange-400 placeholder-slate-700" placeholder="0.0">
                            </td>
                            <td class="py-4 px-2 text-center">
                                <input type="checkbox" class="w-5 h-5 rounded border-slate-600 bg-slate-800 text-orange-500 focus:ring-orange-500 cursor-pointer">
                            </td>
                            <td class="py-4 px-2 no-print text-right">
                                <button type="button" onclick="removeRow(this)" class="text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Bilddokumentation -->
        <section class="dark-card p-6 rounded-2xl shadow-lg mb-8">
            <h2 class="text-sm font-black mb-6 flex items-center justify-between text-white uppercase tracking-wider border-b border-slate-700 pb-4">
                <div class="flex items-center gap-2">
                    <svg class="text-orange-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Bilder & Mängelanzeige
                </div>
                <label class="no-print bg-slate-700 hover:bg-slate-600 cursor-pointer text-white text-[10px] font-black px-4 py-2 rounded-lg transition-all flex items-center gap-2 shadow-lg uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Kamera / Upload
                    <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="previewImages(event)">
                </label>
            </h2>
            <div id="imageGallery" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <!-- Bilder werden hier eingefügt -->
            </div>
            <p id="imagePlaceholder" class="text-slate-600 text-center py-12 italic text-sm border-2 border-dashed border-slate-800 rounded-xl uppercase tracking-widest font-bold">Kein Bildmaterial vorhanden</p>
        </section>

        <!-- Unterschriften -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="dark-card p-6 rounded-2xl shadow-lg border-t-4 border-orange-500">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Signatur Techniker</label>
                    <button type="button" onclick="clearCanvas('sigTechnician')" class="no-print text-[10px] font-bold text-slate-500 hover:text-red-500 uppercase tracking-tighter transition-colors">Zurücksetzen</button>
                </div>
                <canvas id="sigTechnician" width="400" height="150" class="w-full h-32 rounded-xl shadow-inner border-none opacity-90 hover:opacity-100 transition-opacity"></canvas>
            </div>
            <div class="dark-card p-6 rounded-2xl shadow-lg border-t-4 border-white">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] font-black text-white uppercase tracking-widest">Kundenabnahme</label>
                    <button type="button" onclick="clearCanvas('sigCustomer')" class="no-print text-[10px] font-bold text-slate-500 hover:text-red-500 uppercase tracking-tighter transition-colors">Zurücksetzen</button>
                </div>
                <canvas id="sigCustomer" width="400" height="150" class="w-full h-32 rounded-xl shadow-inner border-none opacity-90 hover:opacity-100 transition-opacity"></canvas>
            </div>
        </section>

        <!-- Aktionen -->
        <footer class="flex gap-6 justify-center no-print pb-20">
            <button type="button" onclick="triggerPrint()" class="max-w-md w-full brand-gradient hover:opacity-90 text-white font-black py-5 px-8 rounded-2xl transition-all flex items-center justify-center gap-3 shadow-2xl transform hover:-translate-y-1 active:scale-95 uppercase tracking-widest text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                Als PDF exportieren / Drucken
            </button>
        </footer>

    </div>

    <script>
        // Init Date upon loading
        window.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('currentDate');
            if (dateInput) {
                dateInput.valueAsDate = new Date();
            }
            
            // Setup Canvas Signatures
            setupSignature('sigTechnician');
            setupSignature('sigCustomer');
        });

        // Optimierte Druckfunktion
        function triggerPrint() {
            try {
                window.focus();
                setTimeout(() => window.print(), 100);
            } catch (e) {
                console.error("Drucken blockiert:", e);
                alert("Das Drucken wird in dieser Vorschau blockiert. Bitte drücke STRG + P oder öffne die Datei lokal auf deinem PC.");
            }
        }

        // Arbeitspakete Logik (sichereres Klonen)
        function addRow() {
            const body = document.getElementById('workTableBody');
            const firstRow = body.querySelector('tr');
            
            if (!firstRow) return;

            const newRow = firstRow.cloneNode(true);
            newRow.querySelectorAll('input').forEach(input => {
                if (input.type === 'checkbox') {
                    input.checked = false;
                } else {
                    input.value = '';
                }
            });
            body.appendChild(newRow);
        }

        function removeRow(btn) {
            const body = document.getElementById('workTableBody');
            if (body.querySelectorAll('tr').length > 1) {
                btn.closest('tr').remove();
            }
        }

        // Bildvorschau Logik
        function previewImages(event) {
            const gallery = document.getElementById('imageGallery');
            const placeholder = document.getElementById('imagePlaceholder');
            const files = event.target.files;
            
            if (files && files.length > 0) {
                placeholder.classList.add('hidden');
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'relative group image-preview';
                    div.innerHTML = `
                        <div class="relative overflow-hidden rounded-xl border-2 border-slate-700 shadow-xl">
                            <img src="${e.target.result}" alt="Beweisfoto" class="w-full aspect-square object-cover transition-transform duration-700 group-hover:scale-110">
                            <button type="button" onclick="this.closest('.image-preview').remove(); checkImages();" class="no-print absolute top-2 right-2 bg-red-600/90 text-white p-2 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        <input type="text" placeholder="Bildnotiz..." class="w-full mt-3 text-[10px] text-center border-none bg-slate-900 rounded-lg p-2 text-slate-400 focus:ring-1 focus:ring-orange-500/50">
                    `;
                    gallery.appendChild(div);
                }
                reader.readAsDataURL(file);
            });
            
            // Input zurücksetzen, damit gleiche Datei erneut gewählt werden kann
            event.target.value = '';
        }

        function checkImages() {
            const gallery = document.getElementById('imageGallery');
            const placeholder = document.getElementById('imagePlaceholder');
            if (gallery.children.length === 0) {
                placeholder.classList.remove('hidden');
            }
        }

        // Optimiertes Setup für Canvas (verhindert Passive Listener Warnings & verbessert Performance)
        function setupSignature(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            let drawing = false;

            function startPosition(e) {
                drawing = true;
                draw(e);
            }

            function finishedPosition() {
                drawing = false;
                ctx.beginPath();
            }

            function draw(e) {
                if (!drawing) return;
                
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#0f172a'; 

                const rect = canvas.getBoundingClientRect();
                
                // Koordinaten je nach Eingabe (Touch vs Mouse) berechnen
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const x = clientX - rect.left;
                const y = clientY - rect.top;

                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            // Maus-Events
            canvas.addEventListener('mousedown', startPosition);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', finishedPosition);
            canvas.addEventListener('mouseleave', finishedPosition);

            // Touch-Events (mit passiven Optionen, um Scrolling abzufangen, aber keine Warnungen auszulösen)
            canvas.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                startPosition(e); 
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => { 
                e.preventDefault(); 
                draw(e); 
            }, { passive: false });
            
            canvas.addEventListener('touchend', finishedPosition);
            canvas.addEventListener('touchcancel', finishedPosition);
        }

        // Hilfsfunktion zum Löschen des Canvas
        function clearCanvas(id) {
            const canvas = document.getElementById(id);
            if (canvas) {
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>
</html>
